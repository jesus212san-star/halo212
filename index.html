<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniCraft 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}

canvas{
    display:block;
}

#info{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    color:white;
    font-size:20px;
    z-index:10;
    text-shadow:2px 2px 5px black;
}
</style>
</head>
<body>

<div id="info">
    CLICK PARA EMPEZAR<br>
    WASD = MOVER | ESPACIO = SALTAR
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/PointerLockControls.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);


// LUZ
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,100,50);
light.castShadow = true;
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.4));


// CONTROLES
const controls = new THREE.PointerLockControls(camera, document.body);

document.addEventListener("click",()=>{
    controls.lock();
});

scene.add(controls.getObject());


// SUELO
const blockGeo = new THREE.BoxGeometry(1,1,1);

function createBlock(x,y,z,color){
    const mat = new THREE.MeshStandardMaterial({
        color:color
    });

    const cube = new THREE.Mesh(blockGeo,mat);
    cube.position.set(x,y,z);

    cube.castShadow = true;
    cube.receiveShadow = true;

    scene.add(cube);
}


// GENERAR MUNDO
for(let x=-20; x<20; x++){
    for(let z=-20; z<20; z++){

        let height = Math.floor(Math.random()*3);

        for(let y=0; y<height; y++){

            let color = 0x55aa55;

            if(y===height-1){
                color = 0x33cc33;
            }

            createBlock(x,y,z,color);
        }
    }
}


// PLAYER
camera.position.y = 5;

let moveForward = false;
let moveBackward = false;
let moveLeft = false;
let moveRight = false;

let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();

document.addEventListener('keydown', (e)=>{

    switch(e.code){

        case 'KeyW':
            moveForward = true;
            break;

        case 'KeyS':
            moveBackward = true;
            break;

        case 'KeyA':
            moveLeft = true;
            break;

        case 'KeyD':
            moveRight = true;
            break;

        case 'Space':
            velocity.y += 0.2;
            break;
    }
});

document.addEventListener('keyup', (e)=>{

    switch(e.code){

        case 'KeyW':
            moveForward = false;
            break;

        case 'KeyS':
            moveBackward = false;
            break;

        case 'KeyA':
            moveLeft = false;
            break;

        case 'KeyD':
            moveRight = false;
            break;
    }
});


// ANIMACIÓN
function animate(){

    requestAnimationFrame(animate);

    velocity.x *= 0.9;
    velocity.z *= 0.9;

    velocity.y -= 0.01;

    direction.z = Number(moveForward) - Number(moveBackward);
    direction.x = Number(moveRight) - Number(moveLeft);

    direction.normalize();

    if(moveForward || moveBackward){
        velocity.z -= direction.z * 0.02;
    }

    if(moveLeft || moveRight){
        velocity.x -= direction.x * 0.02;
    }

    controls.moveRight(-velocity.x);
    controls.moveForward(-velocity.z);

    camera.position.y += velocity.y;

    if(camera.position.y < 3){
        velocity.y = 0;
        camera.position.y = 3;
    }

    renderer.render(scene,camera);
}

animate();


// RESPONSIVE
window.addEventListener("resize",()=>{

    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
